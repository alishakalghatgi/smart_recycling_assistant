<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Waste Segregation Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f8f5;
      padding: 30px;
      text-align: center;
    }

    h1 {
      color: #2e7d32;
    }

    select, button {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #2e7d32;
      color: white;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background-color: #1b5e20;
    }
  </style>
</head>
<body>

  <h1>Smart Recycling  Assistant</h1>
  <p>Select an item to know which bin it belongs to:</p>

  <select id="wasteType">
    <option value="">-- Choose an item --</option>
    <option value="organic.html">Banana</option>
    <option value="plastic.html">Plastic Bottle</option>
    <option value="glass.html">Glass Jar</option>
    <option value="paper.html">Paper</option>
    <option value="battery.html">Battery</option>
    <option value="medicine.html">Expired Medicine</option>
    <option value="wrapper.html">Food Wrapper</option>
    <option value="clothes.html">Old Clothes</option>
  </select>
  <br>
  <button onclick="goToPage()">Check Category</button>

  <script>
    function goToPage() {
      const selected = document.getElementById("wasteType").value;
      if (selected) {
        window.location.href = selected; // Directly go to the chosen page
      } else {
        alert("Please select an item first!");
      }
    }
  </script>

</body>
</html>
